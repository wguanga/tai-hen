name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Backend: pytest suite (152+ tests against FastAPI + SQLModel)
  # ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest -q --tb=short

  # ──────────────────────────────────────────────────────────────
  # Frontend: typecheck + Vitest
  # ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No lock file committed (see root .gitignore); cache on package.json
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        # `npm install` (not `npm ci`) — lock file is intentionally untracked
        run: npm install --no-audit --no-fund

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Run Vitest
        run: npm test

      - name: Build (sanity)
        run: npm run build
